<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradiente Verde para Amarelo (Identidade da Barbearia) -->
    <linearGradient id="bcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#FACC15"/>
    </linearGradient>
  </defs>
  
  <!-- Fundo Escuro Premium -->
  <circle cx="50" cy="50" r="48" fill="#1A1A1A" stroke="url(#bcGrad)" stroke-width="2"/>
  
  <!-- Iniciais "BC" (Barbearia do Cazé) -->
  <text x="50" y="50" 
        font-family="'Poppins', sans-serif" 
        font-size="34" 
        font-weight="800" 
        fill="url(#bcGrad)" 
        text-anchor="middle" 
        dominant-baseline="central" 
        letter-spacing="2">
    BC
  </text>
</svg>